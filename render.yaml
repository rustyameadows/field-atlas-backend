services:
  - type: web
    name: field-atlas-backend
    runtime: ruby
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: ./bin/rails server
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: field-atlas-backend-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: NPS_API_KEY
        sync: false
      - key: FIELD_ATLAS_INVITE_HOST
        sync: false
      - key: RAILS_ENV
        value: "production"
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: JOB_CONCURRENCY
        value: "1"
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: RAILS_LOG_LEVEL
        value: "info"

databases:
  - name: field-atlas-backend-db
    databaseName: field_atlas_backend_production
    user: field_atlas_backend
    plan: free
    postgresMajorVersion: "18"
    ipAllowList: []
